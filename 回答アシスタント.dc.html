<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>回答アシスタント | Distill</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --ink: #18181b;
      --muted: #71717a;
      --faint: #a1a1aa;
      --line: #e6e6e9;
      --soft: #f4f4f7;
      --panel: #ffffff;
      --brand: #4f46e5;
      --brand-dark: #4338ca;
      --brand-soft: #eef0ff;
      --green: #1c9c6b;
      --green-soft: #e7f4ee;
      --amber: #d08a1e;
      --amber-soft: #faf1e1;
      --red: #b0413e;
      --red-soft: #f7e9e8;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background: var(--panel);
      font-family: "IBM Plex Sans JP", system-ui, sans-serif;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }
    button, input, select { font: inherit; }
    button { cursor: pointer; }
    .shell { width: 100vw; height: 100vh; display: flex; justify-content: center; overflow: hidden; }
    .app {
      width: 100vw;
      height: 100vh;
      min-height: 0;
      background: var(--panel);
      border: 0;
      border-radius: 0;
      box-shadow: none;
      overflow: hidden;
      display: grid;
      grid-template-columns: 216px minmax(0, 1fr);
    }
    .sidebar {
      background: #fcfcfd;
      border-right: 1px solid #ececee;
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      min-height: 0;
      height: 100vh;
    }
    .brand { display: flex; align-items: center; gap: 9px; padding: 4px 6px 18px; }
    .brand-mark { width: 26px; height: 26px; border-radius: 8px; background: var(--brand); color: #fff; display: grid; place-items: center; font-weight: 700; }
    .brand-name { font-size: 16px; font-weight: 700; }
    .nav-label { font: 600 10px/1 "IBM Plex Mono", monospace; letter-spacing: .1em; color: var(--faint); padding: 10px 8px 8px; }
    .nav { display: grid; gap: 3px; }
    .nav-button {
      border: 0;
      background: transparent;
      color: #52525b;
      border-radius: 10px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 11px;
      font-size: 13.5px;
      font-weight: 500;
      text-align: left;
    }
    .nav-button.active { background: var(--brand-soft); color: var(--brand-dark); font-weight: 600; }
    .map-list { display: grid; gap: 2px; font-size: 12.5px; }
    .map-row { display: flex; align-items: center; gap: 9px; padding: 7px 8px; border-radius: 8px; color: #3f3f46; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--brand); flex: none; }
    .count { margin-left: auto; font: 500 11px/1 "IBM Plex Mono", monospace; color: var(--faint); }
    .team { margin-top: auto; display: flex; align-items: center; gap: 9px; padding: 10px 8px; border-top: 1px solid #f0f0f2; }
    .avatar { width: 28px; height: 28px; border-radius: 50%; background: #e4e4e7; border: 1px solid #dadade; }
    .main { min-width: 0; min-height: 0; display: flex; flex-direction: column; }
    .topbar { height: 65px; border-bottom: 1px solid #ececee; display: flex; align-items: center; padding: 0 24px; gap: 14px; flex: none; }
    .topbar h1 { margin: 0; font-size: 16px; line-height: 1.3; }
    .topbar p { margin: 1px 0 0; color: var(--faint); font-size: 12px; }
    .pill { display: inline-flex; align-items: center; gap: 7px; padding: 5px 12px; border-radius: 999px; border: 1px solid #dde1ff; background: var(--brand-soft); color: var(--brand-dark); font-size: 12px; white-space: nowrap; }
    .ghost { border: 1px solid #e4e4e7; background: #fff; color: #52525b; border-radius: 9px; padding: 7px 13px; font-weight: 600; font-size: 12.5px; }
    .primary { border: 0; background: var(--brand); color: #fff; border-radius: 10px; padding: 10px 18px; font-weight: 700; }
    .linkish { border: 0; background: transparent; color: #52525b; font-weight: 600; padding: 8px; }
    .export-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .export-actions[hidden] { display: none; }
    .view { display: none; flex: 1; min-height: 0; }
    .view.active { display: flex; }
    .answer-view { flex-direction: column; }
    .split { flex: 1; min-height: 0; display: grid; grid-template-columns: clamp(320px, 30vw, 380px) minmax(0, 1fr); }
    .chat-column { border-right: 1px solid #ececee; display: flex; flex-direction: column; min-height: 0; }
    .chat-scroll { flex: 1; overflow: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .msg { display: flex; gap: 9px; align-items: flex-start; animation: msgIn .28s ease; }
    .msg.user { justify-content: flex-end; }
    .bot-badge { width: 26px; height: 26px; flex: none; border-radius: 50%; background: var(--brand); color: #fff; display: grid; place-items: center; font-weight: 700; font-size: 13px; }
    .bubble { max-width: 300px; background: #f4f4f5; color: #27272a; border-radius: 4px 14px 14px 14px; padding: 11px 14px; font-size: 13px; line-height: 1.65; }
    .user .bubble { background: var(--brand); color: #fff; border-radius: 14px 4px 14px 14px; }
    .samples { padding-left: 35px; display: grid; gap: 7px; }
    .sample { border: 1px solid #e4e4e7; background: #fff; border-radius: 10px; padding: 9px 12px; color: #3f3f46; text-align: left; font-size: 12.5px; line-height: 1.4; }
    .sample:hover { border-color: #c7d2fe; background: #f8f9ff; }
    .answer-card { flex: 1; border: 1px solid #dde1ff; border-radius: 4px 14px 14px 14px; overflow: hidden; background: #fff; }
    .answer-card header { background: #f5f6ff; padding: 11px 14px; border-bottom: 1px solid #e7e9ff; }
    .mono-label { font: 600 10px/1 "IBM Plex Mono", monospace; letter-spacing: .06em; color: #6366f1; }
    .answer-card h2 { margin: 4px 0 0; font-size: 14px; color: #312e81; }
    .answer-card p { margin: 6px 0 0; font-size: 12.5px; line-height: 1.7; color: #3f3f46; }
    .composer { border-top: 1px solid #ececee; padding: 14px 18px; }
    .composer-box { display: flex; gap: 9px; align-items: center; background: #f6f6f7; border: 1px solid #ececee; border-radius: 12px; padding: 7px 8px 7px 14px; }
    .composer input { flex: 1; border: 0; background: transparent; outline: 0; color: #27272a; font-size: 13px; min-width: 0; }
    .send { width: 34px; height: 34px; border-radius: 9px; border: 0; background: var(--brand); color: #fff; display: grid; place-items: center; flex: none; }
    .decision-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .decision-buttons button { border-radius: 11px; padding: 13px; border: 1px solid #e4e4e7; font-weight: 700; }
    .yes { background: var(--green-soft); color: #1c6b4f; border-color: #c7e6d7 !important; }
    .tree-panel { background: var(--soft); min-width: 0; min-height: 0; display: flex; flex-direction: column; }
    .tree-head { display: flex; align-items: center; gap: 12px; padding: 14px 22px; flex: none; }
    .tree-wrap { flex: 1; min-height: 0; padding: 0; overflow: hidden; }
    .mindmap {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 0;
      overflow: hidden;
      background: #fafafa;
      background-image: radial-gradient(#d7d7dc 1px, transparent 1px);
      background-size: 18px 18px;
      border-top: 1px solid var(--line);
    }
    .mindmap.map-fullscreen {
      position: fixed;
      inset: 0;
      z-index: 100;
      width: 100vw;
      height: 100vh;
      border: 0;
      border-radius: 0;
    }
    .map-content {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 720px;
      height: 500px;
      transform: translate(-50%, -50%) scale(var(--map-zoom, 1));
      transform-origin: center;
      transition: transform .18s ease;
    }
    .mindmap svg { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; }
    .node { position: absolute; background: #fff; border: 1px solid #dddee3; border-radius: 12px; padding: 9px 11px; box-shadow: 0 1px 3px rgba(24,24,27,.08); transition: opacity .25s ease, box-shadow .25s ease, border-color .25s ease; }
    .node.dim, .edge-label.dim { opacity: .32; }
    .node.active { border-color: var(--brand); box-shadow: 0 0 0 5px rgba(79,70,229,.14), 0 6px 18px -6px rgba(79,70,229,.45); animation: nodePulse 1.9s ease-in-out infinite; }
    .node.leaf.amber { border-left: 3px solid #c68a2e; }
    .node.leaf.green { border-left: 3px solid #2e8b6b; }
    .node.leaf.red { border-left: 3px solid #b0413e; }
    .node-kind { display: inline-block; font: 600 9px/1 "IBM Plex Mono", monospace; letter-spacing: .06em; padding: 3px 6px; border-radius: 5px; background: #f4f4f5; color: #52525b; }
    .node.symptom .node-kind { background: var(--brand-soft); color: var(--brand-dark); }
    .node.leaf.amber .node-kind { background: var(--amber-soft); color: #9a6212; }
    .node.leaf.green .node-kind { background: var(--green-soft); color: #1c6b4f; }
    .node.leaf.red .node-kind { background: var(--red-soft); color: #8e302d; }
    .node-title { margin-top: 6px; font-size: 12.5px; font-weight: 600; line-height: 1.32; }
    .node-sub { margin-top: 4px; color: #52525b; font-size: 10.5px; line-height: 1.35; }
    .edge-label { position: absolute; font: 600 10px/1 "IBM Plex Mono", monospace; border-radius: 6px; padding: 3px 6px; border: 1px solid #e4e4e7; background: #f4f4f5; color: #71717a; transition: opacity .25s ease; }
    .edge-label.yes { background: var(--green-soft); color: #1c6b4f; border-color: #c7e6d7; }
    .map-controls {
      position: absolute;
      right: 16px;
      bottom: 16px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px;
      border: 1px solid rgba(212, 212, 216, .92);
      border-radius: 10px;
      background: rgba(255, 255, 255, .92);
      box-shadow: 0 12px 30px -22px rgba(24, 24, 27, .7);
      backdrop-filter: blur(10px);
    }
    .zoom-button {
      width: 30px;
      height: 30px;
      border: 1px solid #e4e4e7;
      border-radius: 7px;
      background: #fff;
      color: #3f3f46;
      display: grid;
      place-items: center;
      font: 700 13px/1 "IBM Plex Mono", monospace;
    }
    .zoom-button:hover { border-color: #c7d2fe; color: var(--brand-dark); background: #f8f9ff; }
    .zoom-button.wide { width: 48px; font-size: 11px; }
    .zoom-button.full { width: 64px; font-size: 11px; }
    .zoom-readout { min-width: 42px; text-align: center; font: 600 11px/1 "IBM Plex Mono", monospace; color: #52525b; }
    .map-hint { position: absolute; left: 50%; top: 14px; transform: translateX(-50%); font-size: 11px; color: var(--faint); background: rgba(255,255,255,.84); border: 1px solid var(--line); border-radius: 8px; padding: 5px 11px; white-space: nowrap; }
    .import-view, .maps-view { flex-direction: column; }
    .stepper { border-bottom: 1px solid #ececee; padding: 14px 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .step { display: flex; align-items: center; gap: 9px; color: var(--faint); font-size: 13px; font-weight: 500; }
    .step-num { width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid #d4d4d8; display: grid; place-items: center; font: 500 11px/1 "IBM Plex Mono", monospace; }
    .step.done, .step.now { color: #27272a; font-weight: 600; }
    .step.done .step-num { background: var(--brand); border-color: var(--brand); color: #fff; }
    .step.now .step-num { background: var(--brand-soft); border: 2px solid var(--brand); color: var(--brand-dark); }
    .content { flex: 1; min-height: 0; overflow: auto; background: #fbfbfc; }
    .drop { max-width: 560px; margin: 54px auto 0; padding: 0 24px; text-align: center; }
    .drop-card { background: #fff; border: 1.5px dashed #c9c9ce; border-radius: 18px; padding: 48px 32px; }
    .upload-icon { width: 52px; height: 52px; margin: 0 auto; border-radius: 14px; background: var(--brand-soft); color: var(--brand); display: grid; place-items: center; }
    .panel { background: #fff; border: 1px solid #ececee; border-radius: 12px; }
    .mapping-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
    .field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
    .field select { width: 100%; border: 1.5px solid #c7d2fe; border-radius: 9px; padding: 9px 12px; background: #fff; color: #312e81; font: 500 12.5px/1 "IBM Plex Mono", monospace; }
    .table { overflow: hidden; }
    .row { display: grid; gap: 8px; align-items: center; padding: 9px 12px; border-bottom: 1px solid #f4f4f5; font-size: 11.5px; color: #52525b; }
    .row.head { background: #fbfbfc; color: var(--faint); font: 500 10px/1.3 "IBM Plex Mono", monospace; }
    .row span { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .preview-layout { max-width: 900px; margin: 28px auto; padding: 0 24px; display: grid; grid-template-columns: minmax(0, 1fr) 288px; gap: 20px; }
    .settings { padding: 15px; }
    .seg { display: flex; background: #f4f4f5; border-radius: 9px; padding: 3px; margin-top: 8px; }
    .seg span { flex: 1; text-align: center; font-size: 12px; padding: 6px; border-radius: 7px; color: #52525b; }
    .seg .selected { background: #fff; color: var(--ink); font-weight: 600; box-shadow: 0 1px 2px rgba(0,0,0,.06); }
    .switch-row { display: flex; align-items: center; margin-top: 14px; padding-top: 14px; border-top: 1px solid #f0f0f2; font-size: 12px; color: #3f3f46; }
    .switch { margin-left: auto; width: 34px; height: 20px; border-radius: 999px; background: var(--brand); position: relative; }
    .switch::after { content: ""; position: absolute; right: 2px; top: 2px; width: 16px; height: 16px; border-radius: 50%; background: #fff; }
    .processing { max-width: 420px; margin: 120px auto 0; text-align: center; padding: 0 24px; }
    .spinner { width: 46px; height: 46px; margin: 0 auto; border-radius: 50%; border: 3px solid #e4e7ff; border-top-color: var(--brand); animation: spin .8s linear infinite; }
    .route-list { max-width: 840px; margin: 26px auto; padding: 0 24px; }
    .route-card { background: #fff; border: 1px solid #e6e6e9; border-radius: 13px; padding: 15px 17px; margin-top: 12px; }
    .route-proposal { margin-top: 13px; padding: 12px 13px; border-radius: 10px; background: #fbfbfc; border: 1px solid #f0f0f2; }
    .tag { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; border-radius: 7px; padding: 4px 10px; }
    .tag.append { color: var(--brand-dark); background: var(--brand-soft); border: 1px solid #dde1ff; }
    .tag.create { color: #1c6b4f; background: var(--green-soft); border: 1px solid #c7e6d7; }
    .done-screen { max-width: 520px; margin: 80px auto 0; text-align: center; padding: 0 24px; }
    .stats { display: flex; gap: 12px; justify-content: center; margin-top: 24px; }
    .stat { background: #fff; border: 1px solid #ececee; border-radius: 12px; padding: 14px 22px; }
    .stat b { display: block; font: 600 22px/1 "IBM Plex Mono", monospace; color: var(--brand); }
    .toast { position: fixed; right: 22px; bottom: 22px; max-width: 360px; background: #18181b; color: #fff; padding: 12px 14px; border-radius: 12px; box-shadow: 0 18px 42px rgba(0,0,0,.24); font-size: 12.5px; line-height: 1.5; opacity: 0; pointer-events: none; transform: translateY(8px); transition: .2s ease; }
    .toast.show { opacity: 1; transform: none; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    @keyframes nodePulse { 0%,100% { box-shadow: 0 0 0 4px rgba(79,70,229,.16), 0 6px 18px -6px rgba(79,70,229,.45); } 50% { box-shadow: 0 0 0 7px rgba(79,70,229,.08), 0 6px 18px -6px rgba(79,70,229,.5); } }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 720px) {
      .shell { padding: 0; }
      .app { border-radius: 0; min-height: 100vh; grid-template-columns: 1fr; }
      .sidebar { min-height: 0; border-right: 0; border-bottom: 1px solid #ececee; }
      .split { grid-template-columns: 1fr; }
      .chat-column { min-height: 520px; border-right: 0; border-bottom: 1px solid #ececee; }
      .preview-layout { grid-template-columns: 1fr; }
      .mapping-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="app">
      <aside class="sidebar">
        <div class="brand"><div class="brand-mark">D</div><div class="brand-name">Distill</div></div>
        <div class="nav-label">WORKSPACE</div>
        <nav class="nav">
          <button class="nav-button active" data-view-button="answer">回答アシスタント</button>
          <button class="nav-button" data-view-button="import">CSV取り込み</button>
          <button class="nav-button" data-view-button="maps">マインドマップ</button>
        </nav>
        <div class="nav-label" style="padding-top:22px;">マップ</div>
        <div class="map-list">
          <div class="map-row"><span class="dot"></span>ログイン・認証<span class="count">412</span></div>
          <div class="map-row"><span class="dot" style="background:var(--amber)"></span>請求・課金<span class="count">287</span></div>
          <div class="map-row"><span class="dot" style="background:var(--green)"></span>データ同期<span class="count">203</span></div>
        </div>
        <div class="team"><div class="avatar"></div><div><div style="font-size:12px;font-weight:600;">CS チーム</div><div style="font-size:10.5px;color:var(--faint);">サポートログ Q2</div></div></div>
      </aside>

      <main class="main">
        <section id="answer" class="view answer-view active">
          <div class="topbar">
            <div><h1>回答アシスタント</h1><p>マインドマップを辿って、根本原因と回答案を導きます</p></div>
            <div style="margin-left:auto;display:flex;align-items:center;gap:10px;" id="matchMeta" hidden>
              <span class="pill"><span class="dot"></span><span id="matchText">ログイン・認証 マップ · 一致 96%</span></span>
              <button class="ghost" id="resetAnswer">別の質問</button>
            </div>
          </div>
          <div class="split">
            <div class="chat-column">
              <div class="chat-scroll" id="chatScroll"></div>
              <div class="composer" id="composer"></div>
            </div>
            <div class="tree-panel">
              <div class="tree-head">
                <strong style="font-size:13px;">思考プロセス</strong>
                <span id="treeStatus" style="font:500 11.5px/1 'IBM Plex Mono',monospace;color:#8a8a93;">待機中</span>
                <div style="margin-left:auto;display:flex;gap:14px;font-size:10.5px;color:var(--muted);">
                  <span>○ 現在地</span><span>━ 辿った経路</span>
                </div>
              </div>
              <div class="tree-wrap"><div class="mindmap" id="mindmap"></div></div>
            </div>
          </div>
        </section>

        <section id="import" class="view import-view">
          <div class="topbar"><div><h1>CSV取り込み</h1><p>サポートのQ&Aログを取り込み、マインドマップへ振り分けます</p></div></div>
          <div class="stepper" id="stepper"></div>
          <div class="content" id="importContent"></div>
        </section>

        <section id="maps" class="view maps-view">
          <div class="topbar">
            <div><h1 id="mapTitle">マインドマップ：ログイン・認証</h1><p id="mapSubtitle">412件のQ&Aから生成された判断木</p></div>
            <div class="export-actions" id="exportActions" hidden>
              <button class="ghost" data-export-format="json">JSON</button>
              <button class="ghost" data-export-format="csv">CSV</button>
              <button class="ghost" data-export-format="skill">SKILL.md</button>
            </div>
          </div>
          <div class="tree-wrap map-full-wrap" style="background:var(--soft);"><div class="mindmap" id="mapOnly"></div></div>
        </section>
      </main>
    </div>
  </div>
  <input id="fileInput" type="file" accept=".csv,text/csv" hidden>
  <div class="toast" id="toast"></div>

  <script src="./app.js"></script>
</body>
</html>
